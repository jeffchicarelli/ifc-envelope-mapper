<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IFC Debug Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #e8ecf0; color: #222; font-family: monospace; overflow: hidden; }
    canvas { display: block; width: 100vw; height: 100vh; }
    #ui {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      padding: 8px 12px; background: #00000099; backdrop-filter: blur(4px);
      z-index: 10;
    }
    button {
      padding: 4px 10px; background: #f5f5f5; color: #222;
      border: 1px solid #888; border-radius: 4px; cursor: pointer;
      font-family: monospace; font-size: 12px;
    }
    button:hover { background: #ffffff; }
    button.on { background: #ffd24a; border-color: #b88400; }
    #status { font-size: 12px; color: #ddd; min-width: 160px; }
    #layers { display: flex; gap: 6px; flex-wrap: wrap; }
    .layer-btn { font-size: 11px; padding: 2px 8px; border-radius: 3px; }
    .layer-btn.wire { background: #3a3a4a; font-style: italic; }
    .layer-btn.off  { opacity: 0.35; }
    #clipSlider { width: 180px; accent-color: #ffd24a; }
    #clipSlider[disabled] { opacity: 0.35; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three":          "https://cdn.jsdelivr.net/npm/three@0.166/build/three.module.js",
      "three/addons/":  "https://cdn.jsdelivr.net/npm/three@0.166/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="ui">
    <button id="clearBtn">Clear</button>
    <button id="orthoBtn" title="Toggle orthographic / perspective camera">Ortho</button>
    <button id="shotBtn"  title="Download current view as PNG">PNG</button>
    <button id="clipBtn"  title="Toggle horizontal section plane">Clip</button>
    <input type="range" id="clipSlider" min="0" max="1" step="0.01" value="1" disabled
           title="Section height — keeps everything below the plane">
    <button id="liveBtn"  title="Resume following new flushes" class="on">Live</button>
    <input type="range" id="timelineSlider" min="0" max="0" step="1" value="0" disabled
           title="Scrub through past snapshots captured this session">
    <span id="tlLabel">0/0</span>
    <span id="status">Starting…</span>
    <div id="layers"></div>
  </div>

  <script type="module">
    import * as THREE              from 'three';
    import { OrbitControls }       from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader }          from 'three/addons/loaders/GLTFLoader.js';

    // ── Renderer ─────────────────────────────────────────────────────────────
    const canvas   = document.getElementById('canvas');
    // preserveDrawingBuffer lets canvas.toDataURL() read back the rendered
    // image. Without it WebGL clears the framebuffer between frames and the
    // PNG export comes out transparent/black. Small memory cost, no perf hit
    // at the scale we render.
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, preserveDrawingBuffer: true });
    renderer.setPixelRatio(devicePixelRatio);
    renderer.setClearColor(0xe8ecf0, 1);

    // ── Scene ────────────────────────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.add(new THREE.GridHelper(100, 100, 0x999999, 0xbbbbbb));

    // ── Lights ───────────────────────────────────────────────────────────────
    // BIM-viewer convention: hemisphere (sky/ground) + directional key light.
    // Gives surfaces readable shading without any post-processing.
    scene.add(new THREE.HemisphereLight(0xffffff, 0x888899, 0.8));
    const keyLight = new THREE.DirectionalLight(0xffffff, 0.9);
    keyLight.position.set(1, 2, 1.5);
    scene.add(keyLight);

    // ── Camera + Controls ────────────────────────────────────────────────────
    // Two cameras kept in sync; `camera` points at whichever is active so the
    // render loop and OrbitControls don't care which mode is on.
    let camera   = new THREE.PerspectiveCamera(60, 1, 0.01, 10000);
    camera.position.set(20, 20, 20);

    let controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // Swap the active camera while preserving the current orbit target and
    // eye position. OrbitControls binds to a camera in its constructor, so we
    // dispose and recreate it on each swap.
    function setCamera(nextCamera) {
      nextCamera.position.copy(camera.position);
      nextCamera.quaternion.copy(camera.quaternion);

      const prevTarget = controls.target.clone();
      controls.dispose();
      camera = nextCamera;
      controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.target.copy(prevTarget);
      controls.update();

      resize();
    }

    // Build an ortho camera whose frustum matches the perspective camera's
    // current view — same eye, same target, same vertical extent at the
    // target distance. Gives a seamless-looking switch.
    function makeOrthoCamera() {
      const dist = camera.position.distanceTo(controls.target);
      const fov  = (camera.isPerspectiveCamera ? camera.fov : 60) * Math.PI / 180;
      const h    = 2 * dist * Math.tan(fov / 2);
      const w    = h * (innerWidth / innerHeight);
      return new THREE.OrthographicCamera(-w/2, w/2, h/2, -h/2, 0.01, 10000);
    }

    function makePerspectiveCamera() {
      return new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.01, 10000);
    }

    // ── Resize ───────────────────────────────────────────────────────────────
    function resize() {
      const w = innerWidth, h = innerHeight;
      renderer.setSize(w, h);
      if (camera.isPerspectiveCamera) {
        camera.aspect = w / h;
      } else {
        // Preserve vertical extent; recompute horizontal from new aspect.
        const vh = camera.top - camera.bottom;
        const vw = vh * (w / h);
        camera.left  = -vw / 2;
        camera.right =  vw / 2;
      }
      camera.updateProjectionMatrix();
    }
    window.addEventListener('resize', resize);
    resize();

    // ── Clipping plane ───────────────────────────────────────────────────────
    // Horizontal section: normal (0,-1,0) + constant c means "keep y ≤ c".
    // Applied globally via renderer.clippingPlanes so every material (mesh,
    // edge overlay, grid) gets cut identically with no per-material wiring.
    const clipPlane  = new THREE.Plane(new THREE.Vector3(0, -1, 0), 0);
    let   clipActive = false;

    // ── Render loop ──────────────────────────────────────────────────────────
    renderer.setAnimationLoop(() => {
      controls.update();
      renderer.render(scene, camera);
    });

    // ── GLTF state ───────────────────────────────────────────────────────────
    const loader    = new GLTFLoader();
    const statusEl  = document.getElementById('status');
    const layersEl  = document.getElementById('layers');
    let   modelRoot = null;
    let   lastMod         = null;
    let   helperWasDown   = false;
    let   currentSession  = null;

    // Timeline: ring buffer of ArrayBuffers the viewer has fetched this session.
    // 30 slots × ~6 MB typical = ~180 MB worst case. Cleared on session change.
    // We store raw buffers (not parsed scenes) because re-parsing on scrub is
    // O(10ms) while holding parsed three.js objects alive would leak GPU memory
    // unless we disposed them on eviction (much more code).
    const TIMELINE_MAX = 30;
    const timeline     = [];
    let   isLive       = true;
    const GLB_URL   = '/ifc-debug-output.glb';

    // ── DevTools hatch ───────────────────────────────────────────────────────
    // Module-scope vars are invisible to the DevTools console. Expose a read-only
    // accessor bag so you can inspect state while paused, e.g.
    //   __dbg.modelRoot.children.map(c => c.name)
    //   __dbg.scene / __dbg.occupantData / __dbg.highlighted
    window.__dbg = {
      get scene()         { return scene; },
      get modelRoot()     { return modelRoot; },
      get occupantData()  { return occupantData; },
      get elementIndex()  { return elementIndex; },
      get highlighted()   { return highlighted; },
      get timeline()      { return timeline; },
    };

    // ── Load from ArrayBuffer ────────────────────────────────────────────────
    function loadBuffer(buf) {
      loader.parse(buf, '', gltf => {
        if (modelRoot) scene.remove(modelRoot);
        modelRoot = gltf.scene;
        // IFC coordinates are Z-up; three.js is Y-up. Rotate -90° around X
        // so vertical building axis points up in the viewer.
        modelRoot.rotation.x = -Math.PI / 2;
        upgradeMaterials(modelRoot);
        scene.add(modelRoot);
        rebuildLayers();
        rebuildElementIndex();
        highlighted = [];        // old refs belong to the discarded modelRoot
        updateClipRange();
        statusEl.textContent = `Updated ${new Date().toLocaleTimeString()}`;
      }, err => {
        statusEl.textContent = `Parse error: ${err}`;
      });
    }

    // Slider range tracks the model's world-space Y extent so the slider
    // always has meaningful bounds regardless of model size. Called on every
    // load because the model can grow/shrink between debug flushes.
    function updateClipRange() {
      if (!modelRoot) return;
      const bbox = new THREE.Box3().setFromObject(modelRoot);
      if (!isFinite(bbox.min.y)) return;
      clipSliderEl.min   = bbox.min.y;
      clipSliderEl.max   = bbox.max.y;
      clipSliderEl.step  = Math.max((bbox.max.y - bbox.min.y) / 200, 0.01);
      // Preserve current value if still in range; otherwise snap to top (no cut).
      const v = parseFloat(clipSliderEl.value);
      if (!isFinite(v) || v < bbox.min.y || v > bbox.max.y) {
        clipSliderEl.value = bbox.max.y;
      }
      clipPlane.constant = parseFloat(clipSliderEl.value);
    }

    // ── BIM-viewer material upgrade ──────────────────────────────────────────
    // The GLB ships unlit (SharpGLTF WithUnlitShader) with no vertex normals.
    // We need lit shading + edge overlay to actually read geometry — the look
    // Solibri / BIMcollab / xeokit converge on. Done client-side so the
    // serializer stays simple.
    function upgradeMaterials(root) {
      root.traverse(obj => {
        if (!obj.isMesh) return;

        obj.geometry.computeVertexNormals();

        const old = obj.material;
        const color   = old.color   ? old.color.clone() : new THREE.Color(0xcccccc);
        const opacity = old.opacity ?? 1;
        obj.material = new THREE.MeshLambertMaterial({
          color, opacity,
          transparent: opacity < 1,
          side:        THREE.DoubleSide,
          flatShading: true,
        });
        if (old.dispose) old.dispose();

        // Edge overlay — 30° crease threshold picks up real corners,
        // ignores triangulation seams inside flat faces.
        const edges = new THREE.LineSegments(
          new THREE.EdgesGeometry(obj.geometry, 30),
          new THREE.LineBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.35 })
        );
        edges.userData.isEdgeOverlay = true;
        obj.add(edges);
      });
    }

    // ── Poll the server every 200ms for the current GLB ─────────────────────
    // Faster than human F10 cadence in a debugger, so stepping past a
    // GeometryDebug.* call shows the new state before you reach the next line.
    // Cheap in the common case: localhost fetch + Last-Modified string compare;
    // the expensive loader.parse only runs when the header actually changes.
    async function poll() {
      try {
        const res = await fetch(GLB_URL, { cache: 'no-store' });
        if (!res.ok) {
          statusEl.textContent = `Server returned ${res.status}`;
          return;
        }
        // Helper transitioned from down → up (new debug session just started).
        // Full page reload picks up any new viewer HTML/JS AND resets every
        // piece of state (scene, lastMod, layer buttons, slider) in one shot.
        if (helperWasDown) {
          location.reload();
          return;
        }
        // Session-ID check: covers the case where the old→new helper handoff
        // is faster than our poll interval (no fetch error ever observed).
        // A different GUID = different helper process = new debug session.
        const session = res.headers.get('X-Debug-Session');
        if (currentSession !== null && session !== currentSession) {
          location.reload();
          return;
        }
        currentSession = session;
        const mod = res.headers.get('Last-Modified');
        if (mod === lastMod) return;
        lastMod = mod;
        const buf = await res.arrayBuffer();
        pushSnapshot(buf);
        // Occupants sidecar changes in lock-step with the GLB (CLI flushes
        // both from the same code path), so we refetch it here on every GLB
        // change rather than polling it independently.
        fetchOccupants();
        // In paused (scrubbed) mode, keep displaying whatever the user picked;
        // new snapshots still accumulate for later scrubbing.
        if (isLive) loadBuffer(buf);
      } catch (e) {
        helperWasDown = true;
        lastMod       = null;
        statusEl.textContent = `Fetch error: ${e.message}`;
      }
    }

    // ── Layer toggle buttons ─────────────────────────────────────────────────
    // Per-element emission writes one glTF node per BuildingElement tagged with
    // { ifcType, globalId } in extras (surfaced as userData by GLTFLoader). We
    // group those nodes back into one button per ifcType so the UI stays compact
    // — click-picking in Step 3 will use the underlying globalId per mesh.
    // Non-element nodes (lines, points, merged debug meshes) have no ifcType
    // and fall back to per-node buttons keyed by name.
    // Per-layer 3-state cycle: solid (default) → wireframe → hidden → solid.
    function rebuildLayers() {
      layersEl.innerHTML = '';
      if (!modelRoot) return;

      // Preserve first-seen order (Map iterates insertion-order) so layer
      // buttons match the order GeometryDebug emissions arrived in.
      const groups = new Map();
      for (const child of modelRoot.children) {
        const key = child.userData?.ifcType || child.name || 'unnamed';
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(child);
      }
      console.warn('[rebuildLayers] modelRoot children:',
        modelRoot.children.map(c => ({ name: c.name, ifcType: c.userData?.ifcType, gid: c.userData?.globalId })));
      console.warn('[rebuildLayers] groups:', [...groups.keys()]);

      for (const [label, nodes] of groups) {
        const btn = document.createElement('button');
        btn.className   = 'layer-btn';
        btn.textContent = nodes.length > 1 ? `${label} (${nodes.length})` : label;
        btn.style.borderColor = getMeshColor(nodes[0]);

        let state = 0; // 0 = solid, 1 = wireframe, 2 = hidden
        btn.onclick = () => {
          state = (state + 1) % 3;
          for (const node of nodes) {
            node.visible = state !== 2;
            node.traverse(obj => {
              if (obj.isMesh && obj.material) obj.material.wireframe = (state === 1);
              // Hide edge overlay in wireframe mode — the wireframe already
              // draws every triangle edge, keeping the overlay double-draws.
              if (obj.userData.isEdgeOverlay) obj.visible = (state === 0);
            });
          }
          btn.classList.toggle('wire', state === 1);
          btn.classList.toggle('off',  state === 2);
        };
        layersEl.appendChild(btn);
      }
    }

    function getMeshColor(node) {
      let hex = '#888';
      node.traverse(obj => {
        if (obj.isMesh && obj.material?.color) {
          const c = obj.material.color;
          const r = Math.round(c.r * 255).toString(16).padStart(2, '0');
          const g = Math.round(c.g * 255).toString(16).padStart(2, '0');
          const b = Math.round(c.b * 255).toString(16).padStart(2, '0');
          hex = `#${r}${g}${b}`;
        }
      });
      return hex;
    }

    // ── Occupants sidecar + click picking ───────────────────────────────────
    // Sidecar shape: { voxelSize, origin: [x,y,z], nx, ny, nz,
    //                  occupants: { "x,y,z": [globalIds...] } }
    // Emitted by GeometryDebug.VoxelOccupants after rasterize. If absent (older
    // runs, lines/points-only sessions, static-ctor failure) click picking
    // silently no-ops — no error banner, viewer still functional.
    let occupantData  = null;
    let elementIndex  = new Map();   // globalId → element Object3D
    let highlighted   = [];          // meshes whose emissive is currently lit
    let voxelHighlight = null;       // wireframe cube marking the picked voxel

    async function fetchOccupants() {
      try {
        const res = await fetch('/ifc-debug-occupants.json', { cache: 'no-store' });
        occupantData = res.ok ? await res.json() : null;
      } catch {
        occupantData = null;
      }
    }

    // Rebuilt on every glb load because per-element node refs are invalidated
    // when the old modelRoot is removed from the scene.
    function rebuildElementIndex() {
      elementIndex = new Map();
      if (!modelRoot) return;
      for (const node of modelRoot.children) {
        const gid = node.userData?.globalId;
        if (gid) elementIndex.set(gid, node);
      }
    }

    function clearHighlights() {
      for (const mesh of highlighted) {
        mesh.material.emissive?.setHex(0x000000);
      }
      highlighted = [];
    }

    // Attached to modelRoot so the GLB-local → world rotation applies for free.
    // depthTest:false + high renderOrder keeps the wireframe cube visible even
    // when the voxel sits inside opaque geometry (walls, doors).
    function clearVoxelHighlight() {
      if (!voxelHighlight) return;
      voxelHighlight.parent?.remove(voxelHighlight);
      voxelHighlight.traverse(obj => {
        obj.geometry?.dispose();
        obj.material?.dispose();
      });
      voxelHighlight = null;
    }

    function highlightVoxel(x, y, z) {
      clearVoxelHighlight();
      if (!modelRoot || !occupantData) return;
      const { voxelSize, origin } = occupantData;

      // Group: filled box + wire outline. The fill (semi-transparent yellow)
      // carries the color signal — LineBasicMaterial renders at 1 px regardless
      // of zoom (WebGL driver cap on gl.linewidth) and disappears in a dense
      // voxel field, so we don't rely on lines alone. Slightly oversized
      // (+1 %) so the fill pokes past the green marker cube's faces without
      // z-fighting. depthTest:false keeps it visible through occluding walls.
      voxelHighlight = new THREE.Group();
      // Flag every descendant so the raycaster can skip them — the highlight
      // is added under modelRoot and would otherwise block picks of voxels
      // behind it, drifting the highlight on each subsequent click.
      voxelHighlight.userData.isHighlight = true;

      const size = voxelSize * 1.01;
      const fill = new THREE.Mesh(
        new THREE.BoxGeometry(size, size, size),
        new THREE.MeshBasicMaterial({
          color: 0xffd24a, transparent: true, opacity: 0.45,
          depthTest: false, depthWrite: false, side: THREE.DoubleSide,
        }),
      );
      fill.renderOrder = 999;
      voxelHighlight.add(fill);

      const wire = new THREE.LineSegments(
        new THREE.EdgesGeometry(new THREE.BoxGeometry(size, size, size)),
        new THREE.LineBasicMaterial({ color: 0x000000, depthTest: false }),
      );
      wire.renderOrder = 1000;
      voxelHighlight.add(wire);

      voxelHighlight.position.set(
        origin[0] + (x + 0.5) * voxelSize,
        origin[1] + (y + 0.5) * voxelSize,
        origin[2] + (z + 0.5) * voxelSize,
      );
      modelRoot.add(voxelHighlight);
    }

    // Yellow matches the layer-button "on" state (brand color for this viewer).
    function highlightIds(ids) {
      clearHighlights();
      for (const gid of ids) {
        const node = elementIndex.get(gid);
        if (!node) continue;
        node.traverse(obj => {
          if (obj.isMesh && obj.material?.emissive) {
            obj.material.emissive.setHex(0xffd24a);
            highlighted.push(obj);
          }
        });
      }
    }

    const raycaster = new THREE.Raycaster();
    const ndc       = new THREE.Vector2();

    // Suppress clicks that were really orbit-drag releases — OrbitControls
    // consumes the pointer events for camera motion but the browser still
    // emits `click` on mouseup, which would fire our raycaster on every
    // rotate. 5 px in screen space is well below a deliberate click.
    let downX = 0, downY = 0;
    canvas.addEventListener('pointerdown', e => { downX = e.clientX; downY = e.clientY; });

    canvas.addEventListener('click', e => {
      if (Math.hypot(e.clientX - downX, e.clientY - downY) > 5) return;
      if (!modelRoot) return;
      const rect = canvas.getBoundingClientRect();
      ndc.x =  ((e.clientX - rect.left) / rect.width)  * 2 - 1;
      ndc.y = -((e.clientY - rect.top)  / rect.height) * 2 + 1;
      raycaster.setFromCamera(ndc, camera);

      // Filter out any node walking back to a Group we tagged isHighlight so
      // the highlight never picks itself. Traverse the ancestry because the
      // hit object is the inner Mesh/LineSegments, not the tagged Group.
      const allHits = raycaster.intersectObject(modelRoot, true);
      const hits = allHits.filter(h => {
        for (let n = h.object; n && n !== modelRoot; n = n.parent) {
          if (n.userData?.isHighlight) return false;
        }
        return true;
      });
      if (hits.length === 0) {
        clearHighlights();
        clearVoxelHighlight();
        return;
      }

      // If we hit an element node directly (it has a globalId), just highlight
      // that one — bypasses the voxel lookup. Useful when voxels are hidden.
      let node = hits[0].object;
      while (node && node !== modelRoot) {
        if (node.userData?.globalId) {
          highlightIds([node.userData.globalId]);
          clearVoxelHighlight();
          statusEl.textContent = `${node.userData.ifcType ?? 'element'} ${node.userData.globalId}`;
          return;
        }
        node = node.parent;
      }

      // Otherwise: map the world-space hit point back into the GLB-local frame
      // (modelRoot is rotated -90° around X) and bucket into the voxel grid.
      if (!occupantData) return;
      const local = modelRoot.worldToLocal(hits[0].point.clone());
      const { voxelSize, origin } = occupantData;
      const x = Math.floor((local.x - origin[0]) / voxelSize);
      const y = Math.floor((local.y - origin[1]) / voxelSize);
      const z = Math.floor((local.z - origin[2]) / voxelSize);
      const key = `${x},${y},${z}`;
      console.warn('[click]', {
        worldHit: hits[0].point.toArray().map(v => +v.toFixed(3)),
        local:    [local.x, local.y, local.z].map(v => +v.toFixed(3)),
        origin, voxelSize,
        voxel: [x, y, z],
        highlightLocal: [origin[0]+(x+0.5)*voxelSize, origin[1]+(y+0.5)*voxelSize, origin[2]+(z+0.5)*voxelSize].map(v => +v.toFixed(3)),
      });
      highlightVoxel(x, y, z);
      const ids = occupantData.occupants?.[key];
      if (!ids || ids.length === 0) {
        clearHighlights();
        statusEl.textContent = `Voxel ${key} → empty`;
        return;
      }
      highlightIds(ids);
      statusEl.textContent = `Voxel ${key} → ${ids.length} element${ids.length === 1 ? '' : 's'}`;
    });

    // ── Start polling immediately ────────────────────────────────────────────
    // No file picker, no permissions — the helper serves the GLB over HTTP from
    // the same origin that served this page (see IfcEnvelopeMapper.DebugServer).
    setInterval(poll, 200);
    poll();

    document.getElementById('clearBtn').onclick = () => {
      if (modelRoot) { scene.remove(modelRoot); modelRoot = null; }
      layersEl.innerHTML   = '';
      lastMod              = null;
      timeline.length      = 0;
      timelineSliderEl.max = 0;
      timelineSliderEl.value    = 0;
      timelineSliderEl.disabled = true;
      occupantData         = null;
      elementIndex         = new Map();
      highlighted          = [];
      clearVoxelHighlight();
      updateTimelineLabel();
      statusEl.textContent = 'Cleared';
    };

    // ── Timeline scrubber ────────────────────────────────────────────────────
    const timelineSliderEl = document.getElementById('timelineSlider');
    const tlLabelEl        = document.getElementById('tlLabel');
    const liveBtn          = document.getElementById('liveBtn');

    function pushSnapshot(buf) {
      timeline.push(buf);
      if (timeline.length > TIMELINE_MAX) timeline.shift();
      timelineSliderEl.max      = Math.max(0, timeline.length - 1);
      timelineSliderEl.disabled = timeline.length < 2;
      if (isLive) {
        timelineSliderEl.value = timelineSliderEl.max;
      }
      updateTimelineLabel();
    }

    function updateTimelineLabel() {
      const idx = parseInt(timelineSliderEl.value, 10);
      tlLabelEl.textContent = timeline.length === 0
        ? '0/0'
        : `${idx + 1}/${timeline.length}`;
    }

    timelineSliderEl.oninput = () => {
      isLive = false;
      liveBtn.classList.remove('on');
      liveBtn.textContent = 'Paused';
      const idx = parseInt(timelineSliderEl.value, 10);
      if (timeline[idx]) loadBuffer(timeline[idx].slice(0));
      updateTimelineLabel();
    };

    liveBtn.onclick = () => {
      isLive = true;
      liveBtn.classList.add('on');
      liveBtn.textContent = 'Live';
      if (timeline.length > 0) {
        timelineSliderEl.value = timeline.length - 1;
        loadBuffer(timeline[timeline.length - 1].slice(0));
      }
      updateTimelineLabel();
    };

    // ── PNG export ───────────────────────────────────────────────────────────
    // Render one frame synchronously before readback so the canvas buffer is
    // guaranteed fresh (render loop is rAF-driven; without this, a click right
    // after a state change could capture the pre-change frame).
    document.getElementById('shotBtn').onclick = () => {
      renderer.render(scene, camera);
      const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
      const a  = document.createElement('a');
      a.href     = canvas.toDataURL('image/png');
      a.download = `ifc-debug-${ts}.png`;
      a.click();
    };

    // ── Camera toggle ────────────────────────────────────────────────────────
    const orthoBtn = document.getElementById('orthoBtn');
    orthoBtn.onclick = () => {
      const goOrtho = camera.isPerspectiveCamera;
      setCamera(goOrtho ? makeOrthoCamera() : makePerspectiveCamera());
      orthoBtn.classList.toggle('on', goOrtho);
      orthoBtn.textContent = goOrtho ? 'Persp' : 'Ortho';
    };

    // ── Clipping plane toggle + slider ───────────────────────────────────────
    const clipBtn      = document.getElementById('clipBtn');
    const clipSliderEl = document.getElementById('clipSlider');

    clipBtn.onclick = () => {
      clipActive = !clipActive;
      renderer.clippingPlanes = clipActive ? [clipPlane] : [];
      clipSliderEl.disabled = !clipActive;
      clipBtn.classList.toggle('on', clipActive);
      if (clipActive) updateClipRange();
    };

    clipSliderEl.addEventListener('input', () => {
      clipPlane.constant = parseFloat(clipSliderEl.value);
    });
  </script>
</body>
</html>
